name: flawfinder_scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  flawFinder:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Flawfinder and capture exit code
      run: |
        flawfinder --sarif --error-level=1 ./ > flawfinder_results.sarif
        echo "FINDINGS_EXIT_CODE=$?" >> $GITHUB_ENV

    - name: Parse SARIF and create comment body
      run: |
        node <<'EOF'
        const fs = require('fs');
        const path = 'flawfinder_results.sarif';
        const sarif = JSON.parse(fs.readFileSync(path, 'utf8'));
        const results = sarif.runs?.[0]?.results ?? [];

        let summary = `### Flawfinder Scan Results (${results.length} issue${results.length !== 1 ? 's' : ''})\n`;
        if (results.length === 0) summary += `No issues found at or above the configured error level.\n`;

        results.slice(0, 20).forEach((r, i) => {
          const msg = r.message?.text || 'No message';
          const loc = r.locations?.[0]?.physicalLocation?.artifactLocation?.uri || 'unknown';
          const line = r.locations?.[0]?.physicalLocation?.region?.startLine || '?';
          summary += `- \`${loc}:${line}\` — ${msg}\n`;
        });

        if (results.length > 20) summary += `\n...and ${results.length - 20} more.\n`;
        fs.writeFileSync('flawfinder_comment.md', summary);
        EOF

    - name: Post comment to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('flawfinder_comment.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

    - name: Fail if Flawfinder found issues at or above error-level
      run: |
        echo "Flawfinder exit code: $FINDINGS_EXIT_CODE"
        if [ "$FINDINGS_EXIT_CODE" -ne 0 ]; then
          echo "Flawfinder found issues at error-level threshold."
          exit 1
        fi
