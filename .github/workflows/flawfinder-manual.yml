name: flawfinder_manual

on:
  workflow_dispatch:  # Manual trigger

jobs:
  flawFinder:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Flawfinder
      run: sudo apt-get update && sudo apt-get install -y flawfinder

    - name: Run Flawfinder on all source files
      continue-on-error: true
      run: |
        FILES_TO_SCAN=$(echo "$CHANGED_FILES" | grep -vE '(^|/)stubs\.c$|(^|/)bogus_main\.c$|(^|/)db\.h$|(^|/)account\.h$|(^|/)login\.h$|(^|/)logging\.h$|(^|/)banned\.h$|(^|/)Phase2/ScaffoldingFilesNotModified/|\.md$|(^|/)Phase2/PseudoCodeFunctions/|(^|/).*\.ts$' || true)


        if [ -z "$FILES_TO_SCAN" ]; then
          echo "No relevant source files found. Skipping flawfinder."
          echo '{"runs": [{"results": []}]}' > flawfinder_results.sarif
        else
          flawfinder --context --error-level=10 --sarif $FILES_TO_SCAN > flawfinder_results.sarif
        fi


    - name: Parse SARIF and create comment body
      run: |
        node <<'EOF'
        const fs = require('fs');

        try {
          const path = 'flawfinder_results.sarif';
          const sarifContent = fs.readFileSync(path, 'utf8');

          let sarif;
          try {
            sarif = JSON.parse(sarifContent);
          } catch (e) {
            console.error("Failed to parse SARIF JSON:", e);
            console.log("SARIF content:", sarifContent);
            fs.writeFileSync('flawfinder_comment.md', '### Flawfinder Scan Error\nFailed to parse SARIF output.');
            process.exit(1);
          }

          const results = sarif.runs?.[0]?.results ?? [];

          let summary = `### Flawfinder Scan Results (${results.length} issue${results.length !== 1 ? 's' : ''})\n\n`;

          if (results.length === 0) {
            summary += `No issues found at or above the configured error level.\n`;
          } else {
            // Group issues by severity level if available
            const byLevel = {};
            results.forEach(r => {
              const level = r.level || "unknown";
              byLevel[level] = byLevel[level] || [];
              byLevel[level].push(r);
            });

            // Add severity summary if we have levels
            if (Object.keys(byLevel).length > 1) {
              summary += "#### Summary by Severity\n\n";
              Object.keys(byLevel).sort((a, b) => b - a).forEach(level => {
                summary += `- Level ${level}: ${byLevel[level].length} issues\n`;
              });
              summary += "\n";
            }

            summary += "#### Details (up to 30 issues)\n\n";

            results.slice(0, 30).forEach((r, i) => {
              const msg = r.message?.text || 'No message';
              const loc = r.locations?.[0]?.physicalLocation?.artifactLocation?.uri || 'unknown';
              const line = r.locations?.[0]?.physicalLocation?.region?.startLine || '?';
              const level = r.level ? `[${r.level}]` : '';
              const snippet = r.locations?.[0]?.physicalLocation?.region?.snippet?.text || '?';
              summary += `- **${level}** — **${loc}:${line}** — ${msg}\n**Snippet:**\n${"```"}c\n${snippet}\n${"```"}\n\n`;
            });

            if (results.length > 30) {
              summary += `\n... and ${results.length - 30} more issue(s). Consider addressing these security concerns.\n`;
            }
          }

          fs.writeFileSync('flawfinder_comment.md', summary);
          console.log("Successfully created comment from SARIF results");
        } catch (error) {
          console.error("Error in SARIF parsing script:", error);
          fs.writeFileSync('flawfinder_comment.md', '### Flawfinder Scan\nAn error occurred while processing scan results.');
        }
        EOF

    - name: Post comment to commit
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('flawfinder_comment.md', 'utf8');
          await github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: body
          });
