name: Formatting

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.c'
      - '**.h'
  workflow_dispatch:
    inputs:
      check_all_files:
        description: 'Check all files instead of just changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  cpp_style_check:
    runs-on: ubuntu-latest
    name: Check C Styling
    
    steps:
    - name: Checkout this commit
      uses: actions/checkout@v3
      with:
        fetch-depth: 2
        
    - name: uncrustify check
      uses: Daniel-Trevitz/uncrustify-check@v1
      with:
        configFile: 'uncrustify.cfg'
        checkOnlyChangedFiles: ${{ github.event.inputs.check_all_files != 'true' }}
